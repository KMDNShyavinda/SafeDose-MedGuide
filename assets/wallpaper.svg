  <rect width="100%" height="100%" fill="url(#g1)" />

  <!-- soft organic shapes -->
  <g fill-opacity="0.06" fill="#0f172a">
    <path d="M0 300 C200 220 400 380 700 320 C1000 260 1200 420 1600 360 L1600 900 L0 900 Z" />
    <path d="M0 120 C260 40 420 220 760 140 C1100 60 1320 240 1600 160 L1600 0 L0 0 Z" />
